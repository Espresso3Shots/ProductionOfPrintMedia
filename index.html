    <title>การผลิตสื่อสิ่งพิมพ์ | ออกแบบและจัดหน้างานพิมพ์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Charm:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-color: #fdfaf3;
            --text-color: #1a1a1a;
            --accent-color: #8b4513;
            --border-color: #e0d7c6;
            --tech-red: #c0392b;
            --hover-color: #a55a2c;
            --figure-surface: #f7efe3;
            --unit-figure-height: clamp(260px, 34vw, 420px);
            --mini-figure-height: clamp(190px, 18vw, 230px);
        }

        body { font-family: 'Sarabun', sans-serif; background-color: #d2b48c; margin: 0; padding: 0; line-height: 1.8; }

        /* --- Navigation (ปรับปรุงใหม่เพื่อมือถือ) --- */
        nav {
            background-color: var(--accent-color);
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: sticky;
            top: 0; z-index: 1000;
            height: 60px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .site-name { font-family: 'Charm', cursive; font-size: 1.2rem; font-weight: bold; white-space: nowrap; }

        /* Hamburger Icon */
        .menu-toggle { display: none; flex-direction: column; cursor: pointer; gap: 5px; }
        .menu-toggle span { width: 25px; height: 3px; background-color: white; border-radius: 2px; }

        nav ul { list-style: none; display: flex; margin: 0; padding: 0; height: 100%; }
        nav ul li { display: flex; align-items: center; position: relative; }
        nav ul li a,
        .dropdown-toggle {
            color: white;
            text-decoration: none;
            padding: 0 12px;
            height: 100%;
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 0.95rem;
            background: none;
            border: none;
            font-family: inherit;
        }
        nav ul li a:hover,
        .dropdown-toggle:hover { background-color: var(--hover-color); }
        nav ul li a.active,
        .dropdown-toggle.active { background-color: #fdfaf3; color: var(--accent-color); font-weight: bold; }

        .menu-dropdown {
            height: 100%;
        }

        .dropdown-toggle {
            gap: 8px;
        }

        .dropdown-toggle::after {
            content: "▾";
            font-size: 0.8rem;
            transition: transform .2s ease;
        }

        .menu-dropdown.open .dropdown-toggle::after {
            transform: rotate(180deg);
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            min-width: 220px;
            height: auto;
            padding: 8px 0;
            background: #9b5724;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 0 0 12px 12px;
            box-shadow: 0 14px 24px rgba(0,0,0,0.18);
            z-index: 1001;
        }

        .menu-dropdown.open .dropdown-menu {
            display: block;
        }

        .dropdown-menu li {
            width: 100%;
            height: auto;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .dropdown-menu li:last-child {
            border-bottom: none;
        }

        .dropdown-menu li a {
            width: 100%;
            height: auto;
            padding: 12px 16px;
        }

        /* --- Book Layout --- */
        .book-page {
            max-width: 900px; width: 95%;
            margin: 20px auto;
            background-color: var(--paper-color);
            padding: 50px 60px;
            min-height: 85vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-left: 15px solid #a0522d;
            display: none;
            box-sizing: border-box;
        }
        .book-page.active { display: block; }

        header { text-align: center; border-bottom: 3px double var(--border-color); padding-bottom: 25px; margin-bottom: 30px; }
        h1 { margin: 10px 0; font-size: 1.9rem; color: var(--accent-color); }
        
        .content-body h2 { color: var(--accent-color); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 35px; font-size: 1.5rem; }
        .content-body h3 { color: var(--tech-red); margin-top: 25px; font-size: 1.3rem; border-left: 5px solid var(--tech-red); padding-left: 15px; }
        .content-body p { text-indent: 2.5em; margin: 15px 0; text-align: justify; }
        .content-body a { color: var(--tech-red); font-weight: 700; text-decoration-thickness: 2px; }
        .content-body a:hover { color: var(--accent-color); }
        .content-body ul, .content-body ol { margin: 15px 0 20px; padding-left: 1.5rem; }
        .content-body li { margin-bottom: 8px; }
        .content-body table { width: 100%; border-collapse: collapse; margin: 20px 0; background: #fffdf8; }
        .content-body th, .content-body td { border: 1px solid var(--border-color); padding: 12px 14px; text-align: left; vertical-align: top; }
        .content-body th { background: #f1e6d8; color: var(--accent-color); }

        .info-box,
        .summary-box,
        .tech-deep-dive,
        .unit-highlight,
        .detail-card {
            border-radius: 12px;
            box-sizing: border-box;
        }

        .summary-box,
        .tech-deep-dive,

            padding: 18px 20px;
        }

            background: #fff8ee;
            border-left: 8px solid var(--accent-color);
            box-shadow: 0 6px 18px rgba(107, 79, 58, 0.08);
        }

        .summary-box {
            background: linear-gradient(135deg, #fff7ec, #f7ede1);
            border: 1px solid #e8d6bf;
            box-shadow: 0 10px 20px rgba(107, 79, 58, 0.08);
        }

        .tech-deep-dive {
            background: #fff4e6;
            border-left: 8px solid #d35400;
        }

        .unit-highlight {
            background: linear-gradient(135deg, #f8f1e4, #fffaf2);
            border: 1px solid #e5d2b8;
            border-left: 8px solid #8b4513;
        }

        .info-box p,
        .summary-box p,
        .tech-deep-dive p,
        .unit-highlight p,
        .detail-card p,
        .unit-figure figcaption {
            text-indent: 0;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            margin: 20px 0 28px;
        }

        .detail-card {
            background: #fffdf8;
            border: 1px solid #eadcc8;
            padding: 16px;
            box-shadow: 0 6px 14px rgba(107, 79, 58, 0.06);
        }

        .detail-card h4 {

            color: var(--accent-color);
        }

        .unit-figure {
            max-width: 860px;
            margin: 24px auto;
            padding: 14px;
            background: #fffdf8;
            border: 1px solid #e8d8c4;
            border-radius: 14px;
            box-shadow: 0 10px 24px rgba(66, 44, 28, 0.08);
            box-sizing: border-box;
        }

        .unit-figure img {
            display: block;
            width: 100%;
            max-width: 760px;
            height: var(--unit-figure-height);
            margin: 0 auto;
            object-fit: contain;
            object-position: center;
            background: var(--figure-surface);
            border: 1px solid #eadbc8;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .unit-figure figcaption {
            margin-top: 10px;
            font-size: 0.92rem;
            color: #6b4f3a;
            text-align: center;
        }

        .mini-figure-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 14px;
            margin: 14px 0 24px;
            align-items: start;
        }

        .mini-figure-card {
            margin: 0;
            padding: 12px;
            background: #fffaf3;
            border: 1px solid #e6d6c0;
            border-radius: 14px;
            box-shadow: 0 8px 18px rgba(66, 44, 28, 0.06);
            box-sizing: border-box;
        }

        .mini-figure-tag {
            display: inline-flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 4px 10px;
            border-radius: 999px;
            background: #f5e6d2;
            border: 1px solid #e0c4a3;
            color: #7a431c;
            font-size: 0.8rem;
            font-weight: 700;
            line-height: 1.4;
        }

        .mini-figure-card img {
            display: block;
            width: 100%;
            height: var(--mini-figure-height);
            object-fit: contain;
            object-position: center;
            background: var(--figure-surface);
            border: 1px solid #eadbc8;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .mini-figure-card figcaption {
            margin-top: 10px;
            font-size: 0.88rem;
            color: #6b4f3a;
            line-height: 1.6;
        }

        .source-panel {
            margin: 24px 0;
            padding: 18px 20px;
            background: #fffdf8;
            border: 1px solid #e6d6c0;
            border-radius: 14px;
            box-shadow: 0 8px 18px rgba(66, 44, 28, 0.06);
        }

        .source-panel h4 {
            margin: 0 0 10px;
            color: var(--accent-color);
        }

        .source-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .source-list li {
            margin: 0;
            padding: 12px 0;
            border-top: 1px dashed #d9c4aa;
        }

        .source-list li:first-child {
            border-top: none;
            padding-top: 0;
        }

        .source-meta,
        .source-note {
            display: block;
            font-size: 0.9rem;
            color: #6b4f3a;
        }

        .source-note {
            margin-top: 10px;
        }

        .reference-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
            margin: 24px 0;
        }

        .reference-card {
            background: #fffaf2;
            border: 1px solid #ead7c0;
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 8px 20px rgba(66, 44, 28, 0.06);
        }

        .reference-card h3 {
            margin-top: 0;
            border-left: none;
            padding-left: 0;
            color: var(--accent-color);
        }

        .reference-card p {
            text-indent: 0;
        }

        .keyword-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 14px 0 0;
        }

        .keyword-chip {
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            border-radius: 999px;
            background: #f5e6d2;
            border: 1px solid #e0c4a3;
            color: #7a431c;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .asset-list {
            margin: 12px 0 0;
            padding-left: 1.2rem;
        }

        .asset-list li {
            margin-bottom: 6px;
        }

        .asset-name {
            display: inline-block;
            font-size: 0.95rem;
            color: var(--accent-color);
            font-weight: 700;
        }

        .quiz-block {
            margin: 30px 0;
            padding: 24px;
            background: linear-gradient(135deg, #fff8ef, #f7ede2);
            border: 1px solid #e6d3ba;
            border-radius: 16px;
            box-shadow: 0 12px 24px rgba(66, 44, 28, 0.08);
        }

        .quiz-block h2 {
            margin-top: 0;
        }

        .quiz-intro,
        .quiz-result,
        .quiz-question-title,
        .quiz-feedback-state,
        .quiz-feedback-detail p {
            text-indent: 0;
        }

        .quiz-intro {
            margin-bottom: 18px;
            color: #6b4f3a;
        }

        .quiz-list {
            display: grid;
            gap: 16px;
        }

        .quiz-question {
            background: #fffdf9;
            border: 1px solid #ead9c5;
            border-radius: 14px;
            padding: 18px;
        }

        .quiz-question-title {
            margin: 0 0 14px;
            font-weight: 700;
            color: var(--text-color);
        }

        .quiz-options {
            display: grid;
            gap: 10px;
        }

        .quiz-option {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 14px;
            border: 1px solid #e8dccd;
            border-radius: 12px;
            background: #fff9f2;
            cursor: pointer;
            transition: border-color .2s ease, background-color .2s ease, box-shadow .2s ease;
        }

        .quiz-option:hover {
            border-color: #cf9b6a;
            box-shadow: 0 6px 14px rgba(107, 79, 58, 0.08);
        }

        .quiz-option input {
            margin-top: 4px;
            accent-color: var(--accent-color);
            flex-shrink: 0;
        }

        .quiz-option span {
            flex: 1;
            line-height: 1.7;
        }

        .quiz-option.correct {
            background: #eef9f2;
            border-color: #8cc7a1;
        }

        .quiz-option.wrong {
            background: #fff1ee;
            border-color: #df9b93;
        }

        .quiz-feedback {
            display: none;
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #e4d4be;
            background: #f7f0e5;
        }

        .quiz-feedback.visible {
            display: block;
        }

        .quiz-feedback.correct {
            background: #edf9f1;
            border-color: #b7dbc4;
        }

        .quiz-feedback.incorrect {
            background: #fff1ee;
            border-color: #e4b8b2;
        }

        .quiz-feedback.pending {
            background: #fff7e8;
            border-color: #ead4a1;
        }

        .quiz-feedback.reveal {
            background: #eef5ff;
            border-color: #bfd4f3;
        }

        .quiz-feedback-state {
            margin: 0;
            font-weight: 700;
        }

        .quiz-feedback-detail[hidden] {
            display: none;
        }

        .quiz-feedback-detail p {
            margin: 8px 0 0;
        }

        .quiz-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-top: 22px;
        }

        .quiz-result {
            flex: 1 1 280px;
            margin: 0;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px dashed #d7c1a6;
            background: #fffdf8;
            color: #6b4f3a;
        }

        .quiz-result.ready {
            border-style: solid;
        }

        .btn-secondary {
            background: #6b4f3a;
        }

        .btn-light {
            background: #b97745;
        }

        .page-controls { display: flex; justify-content: space-between; margin-top: 50px; padding-top: 25px; border-top: 1px solid var(--border-color); }
        .btn { background: var(--accent-color); color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .menu-toggle { display: flex; }
            nav ul { 
                display: none; 
                flex-direction: column; 
                position: absolute; 
                top: 60px; left: 0; width: 100%; 
                background-color: var(--accent-color);
                height: auto;
            }

            nav ul li { width: 100%; border-bottom: 1px solid rgba(255,255,255,0.1); }

                position: static;

            }

            .quiz-actions { flex-direction: column; align-items: stretch; }

        }
    /* ===== MENU UPGRADE ===== */

nav ul li a,
.dropdown-toggle{
    position: relative;
    transition: background-color .2s ease,
                color .2s ease,
                padding-left .2s ease;
}

/* hover */

.dropdown-toggle:hover{
    background-color: rgba(255,255,255,0.15);

}

}

@media (max-width:768px){
    nav ul{
        max-height:70vh;
        overflow-y:auto;
    }
}

<body>

    <nav>
        <div class="site-name">Production of print media</div>
        <div class="menu-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></div>
        <ul id="main-menu">
            </ul>
    </nav>

    <div id="content-area">
        </div>

    <footer>
        <p style="text-align: center; padding: 20px; font-size: 0.8rem; color: #5d4037;">
            สาขาเทคโนโลยีธุรกิจดิจิทัล วิทยาลัยการอาชีพสุไหงโก-ลก
        </p>
    </footer>

    <script>
        const contentArea = document.getElementById('content-area');
        const mainMenu = document.getElementById('main-menu');
        const unitMenuLabel = 'หน่วยที่ 1-9';

        function isUnitPage(key) {
            return /^u[1-9]$/.test(key);
        }

        function createNavItem(key, label) {
            const li = document.createElement('li');
            li.innerHTML = `<a id="nav-${key}" data-key="${key}" onclick="showPage('${key}')">${label}</a>`;
            return li;
        }

        function createUnitDropdown(unitKeys) {
            const li = document.createElement('li');
            li.className = 'menu-dropdown';
            li.innerHTML = `
                <button type="button" id="nav-units" class="dropdown-toggle" aria-haspopup="true" aria-expanded="false" onclick="toggleUnitDropdown(event)">
                    ${unitMenuLabel}
                </button>
                <ul class="dropdown-menu">
                    ${unitKeys.map((key) => `<li><a id="nav-${key}" data-key="${key}" onclick="showPage('${key}')">${contentData[key].navTitle}</a></li>`).join('')}
                </ul>
            `;
            return li;
        }

        function closeUnitDropdown() {
            const dropdown = document.querySelector('.menu-dropdown');
            const button = document.getElementById('nav-units');
            if (dropdown) dropdown.classList.remove('open');
            if (button) button.setAttribute('aria-expanded', 'false');
        }

        function initBook() {
            if (typeof contentData === 'undefined') return;

            const keys = Object.keys(contentData);
            const unitKeys = keys.filter(isUnitPage);
            let unitsInserted = false;

            // 1. สร้างปุ่มเมนู และ หน้าเนื้อหา ทั้งหมด
            keys.forEach(key => {
                const data = contentData[key];

                if (isUnitPage(key)) {
                    if (!unitsInserted) {
                        mainMenu.appendChild(createUnitDropdown(unitKeys));
                        unitsInserted = true;
                    }
                } else {
                    mainMenu.appendChild(createNavItem(key, data.navTitle));
                }

                // สร้างหน้า
                const page = document.createElement('div');
                page.id = `page-${key}`;
                page.className = 'book-page';
                
                // จัดการปุ่ม นำทาง (Prev/Next)
                const currentIndex = keys.indexOf(key);
                const prevKey = keys[currentIndex - 1];
                const nextKey = keys[currentIndex + 1];

                const controls = `
                    <div class="page-controls">
                        ${prevKey ? `<button class="btn" onclick="showPage('${prevKey}')">⬅ ${contentData[prevKey].navTitle}</button>` : '<div></div>'}
                        ${nextKey ? `<button class="btn" onclick="showPage('${nextKey}')">${contentData[nextKey].navTitle} ➔</button>` : '<div></div>'}
                    </div>
                `;

                page.innerHTML = `
                    <header>
                        <span style="font-weight:bold; color:var(--tech-red);">${data.headerSub || ''}</span>
                        <h1>${data.title}</h1>
                    </header>
                    <div class="content-body">
                        ${data.body}
                        ${controls}
                    </div>
                `;
                decorateSubtopicIllustrations(page, key);
                contentArea.appendChild(page);
            });

            // แสดงหน้าแรก
            showPage('home');
        }

        function showPage(id) {
            document.querySelectorAll('.book-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('nav ul li a, .dropdown-toggle').forEach(a => a.classList.remove('active'));
            
            document.getElementById(`page-${id}`).classList.add('active');
            const currentNav = document.getElementById(`nav-${id}`);
            if (currentNav) currentNav.classList.add('active');
            if (isUnitPage(id)) {
                document.getElementById('nav-units')?.classList.add('active');
            }
            
            closeUnitDropdown();
            toggleMenu(false); // ปิดเมนูมือถือเมื่อกดเลือกหน้า
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleUnitDropdown(event) {
            if (event) event.stopPropagation();

            const dropdown = document.querySelector('.menu-dropdown');
            const button = document.getElementById('nav-units');
            if (!dropdown || !button) return;

            const shouldOpen = !dropdown.classList.contains('open');
            closeUnitDropdown();

            if (shouldOpen) {
                dropdown.classList.add('open');
                button.setAttribute('aria-expanded', 'true');
            }
        }

        function toggleMenu(force) {
            const menu = document.getElementById('main-menu');
            if (force === false) {
                menu.classList.remove('show');
                closeUnitDropdown();
            }
            else {
                menu.classList.toggle('show');
                if (!menu.classList.contains('show')) {
                    closeUnitDropdown();
                }
            }
        }

        function resetQuizQuestion(question) {
            question.querySelectorAll('.quiz-option').forEach((option) => option.classList.remove('correct', 'wrong'));
            const feedback = question.querySelector('.quiz-feedback');
            const state = question.querySelector('.quiz-feedback-state');
            const detail = question.querySelector('.quiz-feedback-detail');
            feedback.className = 'quiz-feedback';
            state.textContent = '';
            detail.hidden = true;
        }

        function evaluateQuizQuestion(question, revealOnly) {
            const answer = question.dataset.answer;
            const selected = question.querySelector('input[type="radio"]:checked');
            const correctOption = question.querySelector(`.quiz-option[data-choice="${answer}"]`);
            const feedback = question.querySelector('.quiz-feedback');
            const state = question.querySelector('.quiz-feedback-state');
            const detail = question.querySelector('.quiz-feedback-detail');

            resetQuizQuestion(question);

            if (!selected && !revealOnly) {
                feedback.className = 'quiz-feedback visible pending';
                state.textContent = 'ยังไม่ได้เลือกคำตอบ';
                detail.hidden = true;
                return { correct: false, unanswered: true };
            }

            if (correctOption) {
                correctOption.classList.add('correct');
            }

            if (selected && selected.value !== answer) {
                selected.closest('.quiz-option')?.classList.add('wrong');
            }

            detail.hidden = false;

            if (revealOnly) {
                feedback.className = 'quiz-feedback visible reveal';
                state.textContent = 'เฉลยข้อนี้';
                return { correct: selected?.value === answer, unanswered: !selected };
            }

            if (selected?.value === answer) {
                feedback.className = 'quiz-feedback visible correct';
                state.textContent = 'ตอบถูก';
                return { correct: true, unanswered: false };
            }

            feedback.className = 'quiz-feedback visible incorrect';
            state.textContent = 'คำตอบนี้ยังไม่ถูก';
            return { correct: false, unanswered: false };
        }

        function updateQuizSummary(unitKey, text) {
            const result = document.querySelector(`#quiz-${unitKey} .quiz-result`);
            if (!result) return;
            result.textContent = text;
            result.classList.add('ready');
        }

        function gradeQuiz(unitKey) {
            const quiz = document.getElementById(`quiz-${unitKey}`);
            if (!quiz) return;

            const questions = Array.from(quiz.querySelectorAll('.quiz-question'));
            let correct = 0;
            let unanswered = 0;

            questions.forEach((question) => {
                const result = evaluateQuizQuestion(question, false);
                if (result.correct) correct += 1;
                if (result.unanswered) unanswered += 1;
            });

            const total = questions.length;
            const incorrect = total - correct - unanswered;
            let summary = `คะแนนเบื้องต้น ${correct}/${total} ข้อ`;

            if (incorrect > 0) {
                summary += `, ผิด ${incorrect} ข้อ`;
            }
            if (unanswered > 0) {
                summary += `, ยังไม่ได้ตอบ ${unanswered} ข้อ`;
            }
            if (correct === total) {
                summary += ' ถูกต้องครบทั้งหมด';
            }

            updateQuizSummary(unitKey, summary);
        }

        function revealQuizAnswers(unitKey) {
            const quiz = document.getElementById(`quiz-${unitKey}`);
            if (!quiz) return;

            const questions = Array.from(quiz.querySelectorAll('.quiz-question'));
            questions.forEach((question) => evaluateQuizQuestion(question, true));
            updateQuizSummary(unitKey, `แสดงเฉลยครบ ${questions.length} ข้อแล้ว สามารถกดล้างคำตอบเพื่อฝึกทำใหม่ได้`);
        }

        function resetQuiz(unitKey) {
            const quiz = document.getElementById(`quiz-${unitKey}`);
            if (!quiz) return;

            quiz.querySelectorAll('input[type="radio"]').forEach((input) => {
                input.checked = false;
            });
            quiz.querySelectorAll('.quiz-question').forEach((question) => resetQuizQuestion(question));

            const result = quiz.querySelector('.quiz-result');
            if (!result) return;
            result.textContent = 'เลือกคำตอบแล้วกดตรวจคำตอบ ระบบจะแสดงผลรายข้อพร้อมเฉลยย่อให้ทันที';
            result.classList.remove('ready');
        }

        window.onload = initBook;

const renderReferenceLink = (key, label) => {
    const ref = referenceCatalog[key];
    return `<a href="${ref.url}" target="_blank" rel="noopener noreferrer">${label || ref.title}</a>`;
};

const renderSourceBlock = (title, intro, keys) => `
    <div class="source-panel">
        <h4>${title}</h4>
        ${intro ? `<p>${intro}</p>` : ""}
        <ul class="source-list">
            ${keys.map((key) => {
                const ref = referenceCatalog[key];
                return `
                    <li>
                        ${renderReferenceLink(key)}
                        <span class="source-meta">${ref.credit} • ${ref.license}</span>
                    </li>
                `;
            }).join("")}
        </ul>
    </div>
`;

const renderPracticeBlock = (title, intro, tasks, outcome) => `
    <div class="info-box" style="border-left: 8px solid #27ae60; background-color: #f6fff8;">
        <strong>${title}</strong>
        <p>${intro}</p>
        <ol>
            ${tasks.map((task) => `<li>${task}</li>`).join("")}
        </ol>
        ${outcome ? `<p class="source-note"><strong>ผลลัพธ์ที่คาดหวัง:</strong> ${outcome}</p>` : ""}
    </div>
`;

const renderScenarioBlock = (title, situation, challenge, response) => `
    <div class="summary-box">
        <h4 style="margin-top:0; color:var(--accent-color); text-align:center;">${title}</h4>
        <p><strong>สถานการณ์:</strong> ${situation}</p>
        <p><strong>ประเด็นที่ต้องตัดสินใจ:</strong> ${challenge}</p>
        <p><strong>แนวทางรับมือ:</strong> ${response}</p>
    </div>
`;

const getChoiceLabel = (index) => String.fromCharCode(65 + index);

const renderQuizBlock = (unitKey) => {
    const quiz = chapterExercises[unitKey];
    if (!quiz) return "";

    return `
        <section class="quiz-block" id="quiz-${unitKey}">
            <h2>${quiz.title}</h2>
            <p class="quiz-intro">${quiz.intro}</p>
            <div class="quiz-list">
                ${quiz.questions.map((question, questionIndex) => `
                    <article class="quiz-question" data-answer="${question.answer}">
                        <p class="quiz-question-title">ข้อ ${questionIndex + 1}. ${question.prompt}</p>
                        <div class="quiz-options">
                            ${question.choices.map((choice, choiceIndex) => `
                                <label class="quiz-option" data-choice="${choiceIndex}">
                                    <input type="radio" name="quiz-${unitKey}-q${questionIndex}" value="${choiceIndex}">
                                    <span><strong>${getChoiceLabel(choiceIndex)}.</strong> ${choice}</span>
                                </label>
                            `).join("")}
                        </div>
                        <div class="quiz-feedback" aria-live="polite">
                            <p class="quiz-feedback-state"></p>
                            <div class="quiz-feedback-detail" hidden>
                                <p><strong>เฉลย:</strong> ${getChoiceLabel(question.answer)}. ${question.choices[question.answer]}</p>
                                <p>${question.explanation}</p>
                            </div>
                        </div>
                    </article>
                `).join("")}
            </div>
            <div class="quiz-actions">
                <button type="button" class="btn" onclick="gradeQuiz('${unitKey}')">ตรวจคำตอบ</button>
                <button type="button" class="btn btn-secondary" onclick="revealQuizAnswers('${unitKey}')">ดูเฉลยทั้งหมด</button>
                <button type="button" class="btn btn-light" onclick="resetQuiz('${unitKey}')">ล้างคำตอบ</button>
                <p class="quiz-result">เลือกคำตอบแล้วกดตรวจคำตอบ ระบบจะแสดงผลรายข้อพร้อมเฉลยย่อให้ทันที</p>
            </div>
        </section>
    `;
};

const getSubtopicCode = (headingText) => {
    const match = headingText.trim().match(/^(\d+\.\d+)/);
    return match ? match[1] : "";
};

const prettifyAssetLabel = (assetPath) => {
    const rawName = assetPath.split("/").pop().replace(/\.[^.]+$/, "");
    return rawName
        .replace(/[-_]+/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/\b\w/g, (char) => char.toUpperCase());
};

const decorateSubtopicIllustrations = (pageElement, pageKey) => {
    const figureMap = subtopicIllustrations[pageKey];
    if (!figureMap) return;

    pageElement.querySelectorAll('.content-body h3').forEach((heading) => {
        const code = getSubtopicCode(heading.textContent);
        const items = figureMap[code];
        if (!items || items.length === 0) return;

        const anchor = heading.nextElementSibling && heading.nextElementSibling.tagName === 'H4'
            ? heading.nextElementSibling
            : heading;

        if (anchor.nextElementSibling?.classList?.contains('mini-figure-grid')) return;
        anchor.insertAdjacentHTML('afterend', renderMiniFigureGrid(items));
    });
};

            <li>กำหนดค่า <strong>Prefix</strong> และตั้งชื่อเพื่อให้จำแนกประเภทเลย์เอาต์ได้ง่าย</li>
            <li><strong>Prefix ที่นิยมใช้:</strong> เช่น A-Template, B-Content, C-Ads เพื่อแยกประเภทหน้ามาสเตอร์ให้เป็นระบบมืออาชีพ</li>
        </ul>

            <li><strong>Batch Apply:</strong> คลิกขวาที่หน้ากระดาษ เลือก <strong>Apply Master to Pages</strong> เพื่อกำหนดมาสเตอร์ให้หลายหน้าพร้อมกันอย่างรวดเร็ว</li>
